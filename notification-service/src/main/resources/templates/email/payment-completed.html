<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      lang="uk">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Платіж виконано</title>
</head>

<body style="margin:0; padding:0; background:#f4f6f8; font-family:Arial, sans-serif;">

<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="padding:40px 0;">
    <tr>
        <td align="center">

            <table role="presentation" width="100%" cellpadding="0" cellspacing="0"
                   style="max-width:520px; background:#ffffff; padding:40px; border-radius:12px;">

                <tr>
                    <td style="text-align:center; padding-bottom:20px;">
                        <h2 style="margin:0; color:#28a745;">
                            Платіж виконано ✅
                        </h2>
                    </td>
                </tr>

                <tr>
                    <td style="font-size:16px; color:#333; padding-bottom:20px; text-align:center;">
                        Ваш платіж успішно оброблено.
                    </td>
                </tr>

                <tr>
                    <td style="background:#f9fafb; padding:20px; border-radius:8px; font-size:14px;">
                        <p><strong>Сума:</strong>
                            <span th:text="${amount}"></span>
                            <span th:text="${fromCurrency}"></span>
                        </p>

                        <p th:if="${convertedAmount != null}">
                            <strong>Зараховано:</strong>
                            <span th:text="${convertedAmount}"></span>
                            <span th:text="${toCurrency}"></span>
                        </p>

                        <p><strong>Категорія:</strong> <span th:text="${category}"></span></p>
                        <p><strong>Дата:</strong> <span th:text="${completedAt}"></span></p>
                        <p><strong>ID операції:</strong> <span th:text="${paymentId}"></span></p>
                    </td>
                </tr>

                <tr>
                    <td style="padding-top:25px; font-size:12px; color:#888; text-align:center;">
                        Дякуємо, що користуєтесь нашим сервісом.
                    </td>
                </tr>

                <tr>
                    <td style="padding-top:30px; text-align:center; font-size:12px; color:#cccccc;">
                        © 2026 LuminaBank. Усі права захищені.
                    </td>
                </tr>

            </table>

        </td>
    </tr>
</table>

</body>
</html>
